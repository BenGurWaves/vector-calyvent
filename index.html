<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR — Text to PDF</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' fill='%23C4DCC8'/%3E%3Crect x='8' y='8' width='16' height='16' fill='%231D1D1D'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Lato:wght@300&family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sage: #C4DCC8;
      --white: #FFFFFF;
      --kraft: #C9B19C;
      --charcoal: #1D1D1D;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--white);
      color: var(--charcoal);
      line-height: 1.7;
      min-height: 100vh;
      position: relative;
      cursor: none;
      overflow-x: hidden;
    }

    /* Custom cursor */
    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid var(--charcoal);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, background 0.3s ease;
      mix-blend-mode: difference;
    }

    .custom-cursor.hover {
      width: 50px;
      height: 50px;
      background: var(--sage);
      border-color: var(--sage);
    }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--charcoal);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* WebGL canvas */
    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Preloader */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--charcoal);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .preloader-text {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      color: var(--sage);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
    }

    .preloader-progress {
      width: 200px;
      height: 2px;
      background: rgba(196, 220, 200, 0.2);
      margin-top: 2rem;
      overflow: hidden;
    }

    .preloader-progress-bar {
      width: 0%;
      height: 100%;
      background: var(--sage);
    }

    /* Paper texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      min-height: 100vh;
      position: relative;
      background: var(--white);
      z-index: 10;
    }

    .left-column {
      padding: 3rem 2rem;
      border-right: 1px solid var(--kraft);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .center-column {
      padding: 3rem 3rem;
      display: flex;
      flex-direction: column;
    }

    .right-column {
      padding: 3rem 2rem;
      border-left: 1px solid var(--kraft);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
    }

    .brand {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--charcoal);
    }

    .sage-accent {
      background: var(--sage);
      padding: 0.5rem 1rem;
      color: var(--charcoal);
    }

    .masthead {
      margin-bottom: 4rem;
    }

    .masthead h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: -0.02em;
      line-height: 0.95;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      color: var(--charcoal);
    }

    .masthead .subtitle {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--kraft);
    }

    .text-input {
      width: 100%;
      min-height: 300px;
      padding: 2rem;
      border: 2px solid var(--sage);
      background: var(--white);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--charcoal);
      resize: vertical;
      transition: all 0.4s ease;
      position: relative;
      z-index: 10;
    }

    .text-input:focus {
      outline: none;
      border-color: var(--charcoal);
    }

    .text-input::placeholder {
      color: var(--kraft);
      font-style: italic;
    }

    .processing-status {
      margin-top: 3rem;
      padding: 2rem;
      background: var(--sage);
      background: linear-gradient(135deg, var(--sage) 0%, rgba(196, 220, 200, 0.7) 100%);
      display: none;
    }

    .processing-status.visible {
      display: block;
    }

    .status-line {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--charcoal);
      margin-bottom: 0.5rem;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }

    .status-line.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .status-line.active {
      font-weight: 400;
    }

    .output-section {
      margin-top: 3rem;
      display: block;
    }

    .copy-button {
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--charcoal);
      border: none;
      padding: 1.25rem 2.5rem;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .copy-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: var(--sage);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .copy-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .copy-button:hover {
      background: var(--kraft);
    }

    .copy-button span {
      position: relative;
      z-index: 1;
    }

    .copy-button.copied {
      background: var(--sage);
      color: var(--charcoal);
    }

    .metadata {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--kraft);
    }

    .legal-links {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .legal-links a {
      color: var(--kraft);
      text-decoration: none;
      margin-left: 1.5rem;
      transition: color 0.3s ease;
    }

    .legal-links a:hover {
      color: var(--charcoal);
    }

    .attribution {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1rem;
    }

    .attribution a {
      color: var(--kraft);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .attribution a:hover {
      color: var(--charcoal);
    }

    input[type="file"] {
      display: none;
    }

    /* Organic decorative elements */
    .organic-shape {
      position: fixed;
      border-radius: 50%;
      background: var(--sage);
      opacity: 0.4;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }

    .organic-shape-1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }

    .organic-shape-2 {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
      background: var(--kraft);
      opacity: 0.2;
    }

    @media (max-width: 1024px) {
      .grid-container {
        grid-template-columns: 1fr;
      }

      .left-column,
      .right-column {
        display: none;
      }

      .center-column {
        padding: 2rem;
      }
    }

    @media (max-width: 768px) {
      .masthead h1 {
        font-size: clamp(2.5rem, 10vw, 4rem);
      }

      .drop-zone {
        padding: 3rem 1.5rem;
      }

      .modal-content {
        padding: 4rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="preloader">
    <div class="preloader-text">Vector</div>
    <div class="preloader-progress">
      <div class="preloader-progress-bar"></div>
    </div>
  </div>

  <div class="custom-cursor"></div>
  <div class="cursor-dot"></div>
  <canvas id="webgl-canvas"></canvas>

  <div class="organic-shape organic-shape-1"></div>
  <div class="organic-shape organic-shape-2"></div>

  <div class="grid-container">
    <div class="left-column">
      <div class="brand sage-accent">VECTOR</div>
      <div class="metadata">
        <div>Text to PDF</div>
        <div style="margin-top: 0.5rem;">Client-Side Processing</div>
      </div>
    </div>

    <div class="center-column">
      <div class="masthead">
        <h1>Vector</h1>
        <div class="subtitle">Text to PDF Generation</div>
      </div>

      <textarea class="text-input" id="textInput" placeholder="Enter your text here..."></textarea>

      <div class="processing-status" id="processingStatus"></div>

      <div class="output-section" id="outputSection">
        <button class="copy-button" id="downloadButton"><span>Download PDF</span></button>
      </div>
    </div>

    <div class="right-column">
      <div class="metadata" style="text-align: right;">
        <div id="timestamp"></div>
      </div>
      <div class="legal-links">
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
      </div>
      <div class="attribution">
        <a href="https://velocity.calyvent.com" target="_blank" rel="noopener">Made by Velocity</a>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lenis smooth scroll
    const lenis = new Lenis({
      duration: 1.2,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      direction: 'vertical',
      gestureDirection: 'vertical',
      smooth: true,
      mouseMultiplier: 1,
      smoothTouch: false,
      touchMultiplier: 2,
    });

    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // GSAP ScrollTrigger integration with Lenis
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => {
      lenis.raf(time * 1000);
    });
    gsap.ticker.lagSmoothing(0);

    // Custom cursor
    const cursor = document.querySelector('.custom-cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.1;
      cursorY += (mouseY - cursorY) * 0.1;
      
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
      
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Magnetic cursor effect
    const magneticElements = document.querySelectorAll('a, button, .drop-zone');
    magneticElements.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // WebGL fluid shader background
    const canvas = document.getElementById('webgl-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      uniform float uTime;
      uniform vec2 uMouse;
      uniform vec2 uResolution;
      varying vec2 vUv;

      // Simplex noise function
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

      float snoise(vec2 v) {
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i  = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod289(i);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m;
        m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
        vec3 g;
        g.x = a0.x * x0.x + h.x * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
      }

      void main() {
        vec2 st = gl_FragCoord.xy / uResolution.xy;
        float aspect = uResolution.x / uResolution.y;
        st.x *= aspect;
        
        float noise = snoise(st * 2.0 + uTime * 0.1);
        float noise2 = snoise(st * 3.0 - uTime * 0.15);
        
        float combined = noise * 0.5 + noise2 * 0.3;
        
        // Mouse influence
        vec2 mouse = uMouse / uResolution;
        mouse.x *= aspect;
        float dist = distance(st, mouse);
        float mouseInfluence = smoothstep(0.5, 0.0, dist) * 0.3;
        
        combined += mouseInfluence;
        
        // Sage green color
        vec3 color = vec3(0.769, 0.863, 0.784); // #C4DCC8
        color += combined * 0.1;
        
        // Add subtle variation
        color.r += snoise(st * 5.0 + uTime * 0.2) * 0.05;
        color.g += snoise(st * 5.0 + uTime * 0.2 + 100.0) * 0.05;
        color.b += snoise(st * 5.0 + uTime * 0.2 + 200.0) * 0.05;
        
        gl_FragColor = vec4(color, 0.15);
      }
    `;

    const uniforms = {
      uTime: { value: 0 },
      uMouse: { value: new THREE.Vector2(0, 0) },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
    };

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
      transparent: true
    });

    const geometry = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    document.addEventListener('mousemove', (e) => {
      uniforms.uMouse.value.x = e.clientX;
      uniforms.uMouse.value.y = window.innerHeight - e.clientY;
    });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.uResolution.value.x = window.innerWidth;
      uniforms.uResolution.value.y = window.innerHeight;
    });

    function animateWebGL() {
      uniforms.uTime.value += 0.01;
      renderer.render(scene, camera);
      requestAnimationFrame(animateWebGL);
    }
    animateWebGL();

    // Preloader animation
    const preloader = document.querySelector('.preloader');
    const preloaderText = document.querySelector('.preloader-text');
    const preloaderProgress = document.querySelector('.preloader-progress-bar');

    gsap.to(preloaderText, { opacity: 1, duration: 0.5, delay: 0.2 });
    gsap.to(preloaderProgress, { width: '100%', duration: 1.5, ease: 'power2.inOut', delay: 0.5 });
    
    gsap.to(preloader, {
      yPercent: -100,
      duration: 1,
      ease: 'power4.inOut',
      delay: 2.5,
      onComplete: () => {
        preloader.style.display = 'none';
      }
    });

    // Update timestamp
    function updateTimestamp() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('timestamp').textContent = `${hours}:${minutes}`;
    }
    updateTimestamp();
    setInterval(updateTimestamp, 60000);

    const textInput = document.getElementById('textInput');
    const processingStatus = document.getElementById('processingStatus');
    const outputSection = document.getElementById('outputSection');
    const downloadButton = document.getElementById('downloadButton');

    function addStatusLine(text, active = false) {
      const line = document.createElement('div');
      line.className = 'status-line' + (active ? ' active' : '');
      line.textContent = text;
      processingStatus.appendChild(line);
      
      setTimeout(() => line.classList.add('visible'), 50);
      
      if (active) {
        const prevActive = processingStatus.querySelector('.status-line.active:not(:last-child)');
        if (prevActive) prevActive.classList.remove('active');
      }
    }

    function clearStatus() {
      processingStatus.innerHTML = '';
    }

    // Text to PDF generation
    if (downloadButton && textInput) {
      downloadButton.addEventListener('click', () => {
        console.log('Download button clicked');
        const text = textInput.value.trim();
        console.log('Text length:', text.length);
        
        if (!text) {
          alert('Please enter some text to convert to PDF');
          return;
        }

        clearStatus();
        outputSection.classList.remove('visible');
        processingStatus.classList.add('visible');

        addStatusLine('Initializing PDF generation...', true);

        try {
          console.log('window.jspdf:', window.jspdf);
          if (!window.jspdf) {
            throw new Error('jsPDF library not loaded');
          }
          
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          
          addStatusLine('Processing text content', true);
          
          // Set up document
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const margin = 25;
          const maxWidth = pageWidth - (margin * 2);
          const lineHeight = 8;
          let y = margin;
          const timestamp = new Date().toLocaleString();

          // Function to add footer to each page
          const addFooter = (pageNum, totalPages) => {
            // Footer - low opacity branding (light gray)
            const footerY = pageHeight - 15;
            doc.setTextColor(128); // Light gray for low opacity effect
            doc.setFontSize(7);
            doc.setFont('helvetica', 'normal');
            doc.text('VECTOR', margin, footerY);
            doc.text(`Generated: ${timestamp}`, pageWidth / 2, footerY, { align: 'center' });
            doc.text('vector.calyvent.com', pageWidth - margin, footerY, { align: 'right' });
            
            // Page number
            doc.setFontSize(6);
            doc.text(`${pageNum} / ${totalPages}`, pageWidth / 2, footerY + 5, { align: 'center' });
          };

          // First page footer
          addFooter(1, 1);
          y = margin;

          // Add content with beautiful typography
          doc.setTextColor(0);
          doc.setFontSize(11);
          doc.setFont('times', 'normal');
          
          const lines = doc.splitTextToSize(text, maxWidth);
          let currentPage = 1;
          let totalPages = 1;
          
          // First pass to count pages
          let tempY = margin;
          lines.forEach((line) => {
            if (tempY > pageHeight - 30) {
              totalPages++;
              tempY = margin;
            }
            tempY += lineHeight;
          });

          addStatusLine(`Processing ${lines.length} lines across ${totalPages} pages`, true);

          // Second pass to render
          y = margin;
          currentPage = 1;
          
          lines.forEach((line, index) => {
            if (y > pageHeight - 30) {
              currentPage++;
              doc.addPage();
              addFooter(currentPage, totalPages);
              y = margin;
            }
            doc.text(line, margin, y);
            y += lineHeight;
          });

          addStatusLine('Generating PDF', true);
          
          // Save the PDF
          doc.save('vector-document.pdf');
          
          addStatusLine('PDF downloaded successfully');
          outputSection.classList.add('visible');

        } catch (error) {
          console.error('PDF generation error:', error);
          addStatusLine(`Generation failed: ${error.message}`);
          alert(`Error: ${error.message}`);
        }
      });
    } else {
      console.error('Download button or text input not found');
    }
